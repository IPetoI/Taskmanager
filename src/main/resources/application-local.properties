# ===== LOCAL DEVELOPMENT CONFIGURATION =====
# Profile: local
# Activate with: --spring.profiles.active=local

# ===== DATABASE CONFIGURATION =====
# MySQL database connection for local development
# Prerequisites: 
#   1. MySQL server running on localhost:3306
#   2. Database created: CREATE DATABASE taskmanager;
#   3. User created: CREATE USER 'root'@'localhost' IDENTIFIED BY 'root';
#   4. Permissions: GRANT ALL PRIVILEGES ON taskmanager.* TO 'root'@'localhost';

spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
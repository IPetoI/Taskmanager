spring.application.name=taskmanager

# Default profile
spring.profiles.active=local

# ===== .env IMPORT (optional) =====
# If you have a .env file, it will override these settings
spring.config.import=optional:file:.env[.properties]

# ===== JPA / HIBERNATE CONFIGURATION =====
# Hibernate DDL (Data Definition Language) strategy
#
# Available options:
# - create: drops and recreates the database every time the application starts (NEVER use in production!)
# - create-drop: same as create, but also drops the database when the application shuts down
# - update: updates the database schema based on the Entity classes while preserving existing data
# - validate: only validates the schema without making any changes (the safest option for production)
# - none: disables automatic schema management (manual SQL scripts are required)
spring.jpa.hibernate.ddl-auto=update

# Format SQL queries for better readability in logs
spring.jpa.properties.hibernate.format_sql=true

# Enable SQL query logging (for debugging)
spring.jpa.show-sql=true

# Prevent LazyInitializationException issues
spring.jpa.open-in-view=false

# ===== JWT CONFIGURATION =====
# Use a simple secret for local development
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION}

# ===== WEB SERVER CONFIGURATION =====
server.port=8080

# MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== ADMIN ACCOUNT =====
# This is the application's only admin account.
# It is created (or updated) automatically when the application starts.
app.admin.username=admin
app.admin.password=admin
app.admin.email=petoojozsef@gmail.com
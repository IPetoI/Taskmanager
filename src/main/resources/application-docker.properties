# ===== DOCKER CONFIGURATION =====
# Profile: docker
# Activate with: --spring.profiles.active=docker
# Used in docker-compose.yml deployment

# ===== DATABASE CONFIGURATION =====
# MySQL database in Docker container
# The hostname 'mysql' matches the service name in docker-compose.yml
# Environment variables from docker-compose.yml or .env file

spring.datasource.url=jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=peto
spring.datasource.password=${DB_PASS}